<style>
:root {
  --bg:#080c14; --bg2:#0d1220; --bg3:#141926; --bg4:#1a2133;
  --accent:#e8303a; --text:#f0f4ff; --text2:#8a9bb8; --text3:#4a5a7a;
  --border:#1e2a40; --glow:rgba(232,48,58,.3);
  --r:12px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Manrope',sans-serif;
  background:var(--bg); color:var(--text);
  display:flex; flex-direction:column;
  /* мобильная высота с учётом safe area */
  height: 100dvh;
}

/* ═══ HEADER ═══ */
.header{
  background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  padding:0 16px; height:56px; flex-shrink:0; z-index:50;
  padding-top: env(safe-area-inset-top, 0);
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;display:flex;align-items:center;gap:7px;white-space:nowrap}
.logo span{color:var(--accent)}
.logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 7px var(--accent);animation:blink 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.h-search{flex:1;position:relative;max-width:340px}
.h-search input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Manrope',sans-serif;
  font-size:14px;padding:8px 12px 8px 34px;outline:none;
  transition:border-color .2s;
}
.h-search input:focus{border-color:var(--accent)}
.h-search input::placeholder{color:var(--text3)}
.h-search .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}

.h-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{
  width:38px;height:38px;border-radius:9px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s; flex-shrink:0;
}
.icon-btn:hover,.icon-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ═══ MAIN AREA ═══ */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* ═══ SIDEBAR (desktop) ═══ */
.sidebar{
  width:280px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  transition:transform .3s ease;
}
.sb-head{padding:12px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.sb-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:20px}

.type-pills{display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.type-pills::-webkit-scrollbar{display:none}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);white-space:nowrap;transition:all .2s}
.pill:hover{background:var(--bg4);color:var(--text)}
.pill.on{border-color:var(--accent);color:var(--accent);background:rgba(232,48,58,.08)}

.ch-list{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.ch-list::-webkit-scrollbar{width:3px}
.ch-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

.ch-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:2px;-webkit-tap-highlight-color:transparent}
.ch-item:hover{background:var(--bg3)}
.ch-item.on{background:var(--bg4);border-color:var(--accent)}
.ch-logo{width:42px;height:28px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:8px;font-weight:700;color:var(--text3);text-align:center}
.ch-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-meta{font-size:11px;color:var(--text3);margin-top:1px}
.live-pip{width:6px;height:6px;background:#3dd68c;border-radius:50%;flex-shrink:0;box-shadow:0 0 5px #3dd68c;animation:blink 2s infinite}
.off-pip{width:6px;height:6px;background:var(--text3);border-radius:50%;flex-shrink:0}

/* ═══ CONTENT ═══ */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ═══ GRID ═══ */
.grid-wrap{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.grid-wrap::-webkit-scrollbar{width:5px}
.grid-wrap::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.compact-grid .ch-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.compact-grid .card-thumb{height:68px}
.compact-grid .card-body{padding:6px 8px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.card:active{transform:scale(.97)}
.card-thumb{height:82px;background:var(--bg4);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-thumb img{max-width:70%;max-height:62%;object-fit:contain;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5))}
.card-fb{color:var(--text3);font-size:10px;font-weight:700;text-align:center;padding:4px;line-height:1.3}
.play-ov{position:absolute;inset:0;background:rgba(232,48,58,0);display:flex;align-items:center;justify-content:center;transition:background .2s}
.card:hover .play-ov{background:rgba(232,48,58,.18)}
.play-ic{width:34px;height:34px;border-radius:50%;background:rgba(232,48,58,.9);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.6);transition:all .2s}
.card:hover .play-ic,.card:active .play-ic{opacity:1;transform:scale(1)}
.badge{position:absolute;top:6px;right:6px;background:var(--accent);color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.5px}
.badge.off{background:rgba(255,255,255,.08);color:var(--text3)}
.rbadge{position:absolute;top:6px;left:6px;background:rgba(61,214,140,.12);color:#3dd68c;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;border:1px solid rgba(61,214,140,.3)}
.card-body{padding:8px 10px}
.card-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* ═══ PLAYER ═══ */
.player-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.embed-wrap{width:100%;position:relative;background:#000;flex-shrink:0}
.embed-wrap::after{content:'';display:block;padding-bottom:56.25%}
.embed-wrap iframe,.embed-wrap .video-js,.embed-wrap #ackadarPlayer{position:absolute;inset:0;width:100%;height:100%;border:none}

.src-bar{
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;
}
.src-bar::-webkit-scrollbar{display:none}
.src-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);white-space:nowrap;flex-shrink:0}
.src-btn{
  padding:5px 13px;border-radius:6px;font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid var(--border);background:var(--bg3);
  color:var(--text2);transition:all .2s;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;
}
.src-btn:hover{background:var(--bg4);color:var(--text)}
.src-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.pib{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;min-width:0}
.pib-logo{width:42px;height:28px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:8px;font-weight:700;color:var(--text3)}
.pib-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.pib-name{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pib-owner{font-size:11px;color:var(--text3);flex-shrink:0}
.pib-live{background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:4px;flex-shrink:0}
.pib-live::before{content:'';width:5px;height:5px;background:#fff;border-radius:50%;animation:blink 1s infinite}
.pib-off{background:var(--bg4);color:var(--text3);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0}

.p-related{flex:1;overflow-y:auto;padding:12px 14px;background:var(--bg2)}

/* ═══ MOBILE BOTTOM NAV ═══ */
.bottom-nav{
  display:none;
  background:var(--bg2);border-top:1px solid var(--border);
  flex-shrink:0;z-index:60;
  padding-bottom: var(--safe-bottom);
}
.bn-inner{display:flex;height:56px}
.bn-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;
  color:var(--text3);font-size:10px;font-weight:600;
  transition:all .2s;-webkit-tap-highlight-color:transparent;
  border:none;background:none;
}
.bn-tab svg{transition:all .2s}
.bn-tab.on{color:var(--accent)}
.bn-tab.on svg{filter:drop-shadow(0 0 4px var(--accent))}

/* ═══ MOBILE DRAWER ═══ */
.drawer-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);z-index:70;
  opacity:0;transition:opacity .3s;
}
.drawer-overlay.open{display:block;opacity:1}
.drawer{
  position:fixed;left:0;top:0;bottom:0;
  width:min(320px, 85vw);
  background:var(--bg2);z-index:80;
  display:flex;flex-direction:column;
  transform:translateX(-100%);transition:transform .3s ease;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: var(--safe-bottom);
}
.drawer.open{transform:translateX(0)}
.drawer-head{
  padding:14px 16px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
.drawer-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;display:flex;align-items:center;gap:7px}
.drawer-title span{color:var(--accent)}
.drawer-close{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}

.drawer-search{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Manrope',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s}
.drawer-search input:focus{border-color:var(--accent)}
.drawer-search input::placeholder{color:var(--text3)}

.drawer-pills{display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.drawer-pills::-webkit-scrollbar{display:none}

.drawer-list{flex:1;overflow-y:auto;padding:6px;-webkit-overflow-scrolling:touch}

/* ═══ STATES ═══ */
.state-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3)}
.loader{width:36px;height:36px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.no-ch{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3)}
.no-ch-icon{width:70px;height:70px;border:2px dashed var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.no-ch h3{color:var(--text2);font-size:15px}
.no-ch p{font-size:13px}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .sidebar{display:none}
  .bottom-nav{display:block}
  .h-search{display:none}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .card-thumb{height:72px}
  .grid-wrap{padding:12px}
}
@media(min-width:769px){
  .drawer,.drawer-overlay{display:none!important}
}
</style>

.card:hover .play-ic{opacity:1;transform:scale(1)}
.badge{position:absolute;top:6px;right:6px;background:var(--accent);color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px}
.badge.off{background:rgba(255,255,255,.08);color:var(--text3)}
.like-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.6);border-radius:20px;padding:3px 6px;font-size:10px;display:flex;align-items:center;gap:3px;cursor:pointer;z-index:5}
.like-badge:hover{background:rgba(255,64,64,.8)}
.like-badge.liked{color:#ff4444;background:rgba(255,64,64,.3)}
.rbadge{position:absolute;top:6px;left:6px;background:rgba(61,214,140,.12);color:#3dd68c;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;border:1px solid rgba(61,214,140,.3)}
.card-body{padding:8px 10px}
.card-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:10px;color:var(--text3)}
.player-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.embed-wrap{width:100%;position:relative;background:#000;flex-shrink:0}
.embed-wrap::after{content:'';display:block;padding-bottom:56.25%}
.embed-wrap iframe,.embed-wrap .video-js,.embed-wrap #ackadarPlayer{position:absolute;inset:0;width:100%;height:100%;border:none}
.src-bar{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.src-btn{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);white-space:nowrap}
.src-btn:hover{background:var(--bg4);color:var(--text)}
.src-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.pib{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.pib-logo{width:42px;height:28px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:8px;font-weight:700}
.pib-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.pib-name{font-size:15px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pib-owner{font-size:11px;color:var(--text3)}
.pib-live{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:4px}
.pib-live::before{content:'';width:5px;height:5px;background:#fff;border-radius:50%;animation:blink 1s infinite}
.pib-off{background:var(--bg4);color:var(--text3);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}
.pib-like-btn{background:var(--bg3);border:1px solid var(--border);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.pib-like-btn.liked{background:rgba(255,64,64,.2);border-color:var(--accent);color:var(--accent)}
.p-related{flex:1;overflow-y:auto;padding:12px 14px;background:var(--bg2)}
.settings-section{background:var(--bg3);border-radius:var(--r);border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.settings-section-title{padding:16px 20px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border)}
.setting-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap}
.setting-row:last-child{border-bottom:none}
.setting-label{flex:1}
.sl-title{font-size:13px;font-weight:600}
.sl-desc{font-size:11px;color:var(--text3);margin-top:2px}
.theme-picker{display:flex;gap:8px}
.theme-opt{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.theme-opt.selected{border-color:var(--accent)}
.toggle{width:44px;height:24px;background:var(--bg4);border-radius:12px;cursor:pointer;position:relative}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.accent-picker{display:flex;gap:6px}
.accent-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.accent-opt.selected{border-color:var(--text);transform:scale(1.1)}
.profile-header{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:var(--r);padding:24px;margin-bottom:20px;border:1px solid var(--border);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.profile-avatar{width:70px;height:70px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700}
.profile-stats{display:flex;gap:24px;margin-top:8px}
.pstat{text-align:center}
.pstat-n{font-size:18px;font-weight:700}
.pstat-l{font-size:11px;color:var(--text3)}
.subscriptions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:12px}
.sub-card{background:var(--bg3);border-radius:var(--r);padding:12px;text-align:center;cursor:pointer;border:1px solid var(--border);transition:all .2s;position:relative}
.sub-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.sub-card .remove-like{position:absolute;top:5px;right:8px;background:rgba(0,0,0,.5);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:12px;opacity:0;transition:opacity .2s}
.sub-card:hover .remove-like{opacity:1}
.bottom-nav{display:none;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.bn-inner{display:flex;height:56px}
.bn-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;background:none;border:none}
.bn-tab.on{color:var(--accent)}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:70}
.drawer-overlay.open{display:block}
.drawer{position:fixed;left:0;top:0;bottom:0;width:min(320px,85vw);background:var(--bg2);z-index:80;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .3s;padding-top:env(safe-area-inset-top);padding-bottom:var(--safe-bottom)}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.drawer-title{font-family:'Bebas Neue';font-size:20px;display:flex;align-items:center;gap:7px}
.drawer-title span{color:var(--accent)}
.drawer-close{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer}
.drawer-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.drawer-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;outline:none}
.drawer-pills{display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid var(--border);overflow-x:auto}
.drawer-list{flex:1;overflow-y:auto;padding:6px}
.state-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3)}
.loader{width:36px;height:36px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* TELEGRAM BANNER */
.tg-banner{background:linear-gradient(135deg,#1e2a3a,#0a0f1a);border:1px solid rgba(255,64,64,.3);border-radius:16px;margin-bottom:24px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;cursor:pointer;transition:all .2s}
.tg-banner:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 25px rgba(255,64,64,.2)}
.tg-banner-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tg-icon{width:48px;height:48px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px}
.tg-text h4{font-size:16px;font-weight:800;margin-bottom:4px}
.tg-text h4 span{color:var(--accent)}
.tg-text p{font-size:12px;color:var(--text2);margin:0}
.tg-badge{background:rgba(255,64,64,.2);border:1px solid var(--accent);border-radius:40px;padding:6px 14px;font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap}
@media(max-width:768px){
  .sidebar{display:none}
  .bottom-nav{display:block}
  .h-search{display:none}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .card-thumb{height:72px}
  .tg-banner{flex-direction:column;text-align:center}
  .tg-banner-left{justify-content:center}
}

.sub-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 12px;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.sub-btn:hover{border-color:var(--accent);color:var(--text)}
.sub-btn.on{background:rgba(255,64,64,.22);border-color:var(--accent);color:#fff}
.sub-btn.small{position:absolute;left:6px;bottom:6px;padding:4px 8px;font-size:9px;z-index:5}
.rec-chip{font-size:9px;background:rgba(255,64,64,.18);color:#ff8f8f;border:1px solid rgba(255,64,64,.4);padding:2px 6px;border-radius:30px;margin-left:6px}
.toast-wrap{position:fixed;right:14px;bottom:calc(76px + var(--safe-bottom));display:flex;flex-direction:column;gap:8px;z-index:1200}
.toast{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:10px 12px;min-width:240px;max-width:320px;box-shadow:0 10px 25px rgba(0,0,0,.35);font-size:12px}
.toast b{color:var(--text)}

.stars-hud{position:fixed;left:12px;bottom:calc(78px + var(--safe-bottom));z-index:1100;background:rgba(13,18,32,.9);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(6px)}
.stars-count{font-size:13px;font-weight:700}
.stars-meta{font-size:10px;color:var(--text3)}
.stars-btn{border:1px solid var(--accent);background:rgba(255,64,64,.2);color:#fff;border-radius:8px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer}
.bear-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.48);z-index:1300;padding:18px}
.bear-card{max-width:340px;width:100%;background:linear-gradient(135deg,#1b2438,#0d1220);border:1px solid rgba(255,64,64,.4);border-radius:16px;padding:18px;text-align:center;box-shadow:0 12px 35px rgba(0,0,0,.5)}
.bear3d{font-size:72px;line-height:1;display:inline-block;animation:bearFloat 2.6s ease-in-out infinite;filter:drop-shadow(0 8px 12px rgba(0,0,0,.35))}
@keyframes bearFloat{0%,100%{transform:translateY(0) rotateY(0deg)}50%{transform:translateY(-8px) rotateY(16deg)}}
.bear-card h3{margin:8px 0 6px;font-size:18px}
.bear-card p{font-size:13px;color:var(--text2);line-height:1.45;margin-bottom:12px}
.rewards-list{font-size:12px;color:var(--text2);text-align:left;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;line-height:1.5;margin-bottom:12px}
.rewards-list b{color:var(--text)}
.reward-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;border-top:1px solid rgba(255,255,255,.06)}
.reward-row:first-of-type{border-top:none}
.reward-row button{background:var(--bg4);border:1px solid var(--border);color:var(--text2);border-radius:7px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer}
.reward-row button:hover{border-color:var(--accent);color:#fff}
.bear-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.bear-actions button{border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
.tap-primary{background:var(--accent);color:#fff}
.tap-secondary{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.inactive-overlay{position:absolute;inset:0;background:rgba(5,8,14,.92);display:flex;align-items:center;justify-content:center;z-index:11;padding:18px}
.inactive-card{max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.inactive-card h4{font-size:16px;margin-bottom:6px}
.inactive-card p{font-size:13px;color:var(--text2);line-height:1.45;margin-bottom:12px}
@media(max-width:768px){
  .header{gap:8px;padding-inline:10px}
  .logo{font-size:20px;letter-spacing:1px}
  .tg-banner-left,.tg-badge{display:none}
  .stars-hud{
    left:10px;
    right:10px;
    bottom:calc(66px + var(--safe-bottom));
    width:auto;
    max-width:calc(100vw - 20px);
    justify-content:space-between;
    gap:8px;
    padding:8px 10px;
  }
  .stars-count{font-size:12px}
  .stars-meta{font-size:10px}
  .stars-btn{font-size:10px;padding:5px 7px;white-space:nowrap}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo"><div class="logo-dot"></div>NonStopStream<span>TV</span></div>
     <div class="tg-banner-left">
      <div class="tg-icon">📺</div>
      <div class="tg-text">
        <h4>🚀 <span>Смотрите проверенный каналы «StreamLIVETV»</span> Поток оригинален</h4>
        <p>Создан сервис для вашего удобства</p>
      </div>
    </div>
    <div class="tg-badge">Смотрите больше чем надо →</div>
  <div class="h-search">
    <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="desktopSearch" placeholder="Поиск каналов...">
  </div>
  <div class="h-right">
    <!-- кнопка сетка/плеер только на десктопе -->
    <button class="icon-btn on" id="btnGrid" onclick="switchView('grid')" title="Сетка" style="display:none">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="icon-btn" id="btnPlayer" onclick="switchView('player')" title="Плеер" style="display:none">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <!-- кнопка бургер только на мобиле -->
    <button class="icon-btn" id="btnBurger" onclick="openDrawer()" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <button class="icon-btn" id="btnSettings" onclick="switchView('settings')" title="Настройки">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- DESKTOP SIDEBAR -->
  <div class="sidebar">
    <div class="sb-head">
      <span class="sb-label">Каналы</span>
      <span class="sb-count" id="sbCount">—</span>
    </div>
    <div class="type-pills" id="desktopPills">
      <button class="pill on" onclick="setType(this,'all')">Все</button>
      <button class="pill"    onclick="setType(this,'tv')">📺 ТВ</button>
      <button class="pill"    onclick="setType(this,'radio')">📻 Радио</button>
    </div>
    <div class="ch-list" id="sidebarList"></div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bn-inner">
    <button class="bn-tab on" id="bnHome" onclick="mobileTab('grid')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Каналы
    </button>
    <button class="bn-tab" id="bnPlayer" onclick="mobileTab('player')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Плеер
    </button>
    <button class="bn-tab" id="bnSearch" onclick="mobileTab('search')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Поиск
    </button>
    <button class="bn-tab" id="bnList" onclick="openDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Список
    </button>
    <button class="bn-tab" id="bnSettings" onclick="mobileTab('settings')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33"></path></svg>
      Настройки
    </button>
  </div>
</nav>

<!-- MOBILE DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-title"><div class="logo-dot"></div>Stream<span>TV</span></div>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-search">
    <input type="text" id="mobileSearch" placeholder="Поиск каналов...">
  </div>
  <div class="drawer-pills">
    <button class="pill on" onclick="setType(this,'all')">Все</button>
    <button class="pill"    onclick="setType(this,'tv')">📺 ТВ</button>
    <button class="pill"    onclick="setType(this,'radio')">📻 Радио</button>
  </div>
  <div class="drawer-list ch-list" id="drawerList"></div>
</div>

<!-- MOBILE SEARCH OVERLAY -->
<div id="mobileSearchWrap" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:55;padding:16px;padding-top:calc(16px + env(safe-area-inset-top))">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div style="position:relative;flex:1">
      <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3)" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="mobileSearchInline" type="text" placeholder="Поиск каналов..."

const LEGACY_APP_PATH = '/public/streamlivetv/';
function getAppBasePath() {
  const path = window.location.pathname || '/';
  const legacyIdx = path.toLowerCase().indexOf(LEGACY_APP_PATH);
  if (legacyIdx >= 0) return LEGACY_APP_PATH;
  if (path.endsWith('/')) return path;
  const slashIdx = path.lastIndexOf('/');
  return slashIdx >= 0 ? `${path.slice(0, slashIdx + 1) || '/'}` : '/';
}
function getAppUrl(relative = '') {
  const cleanBase = getAppBasePath().replace(/\/+$/, '/');
  const cleanRel = String(relative || '').replace(/^\/+/, '');
  return cleanRel ? `${cleanBase}${cleanRel}` : cleanBase;
}

window.onload = () => {
  setupResponsive();
  showLoading();
  bindSearch();
  initStarsLoop();
  initSeoDefaults();
  initSettings();
  loadAllChannels();
  startNotificationPolling();
  maybeRequestNotificationPermission();
  window.addEventListener('resize', setupResponsive);
  window.addEventListener('popstate', handleRouteByPath);
};

function bindSearch() {
  document.getElementById('desktopSearch').addEventListener('input', e => { searchQ = e.target.value.toLowerCase().trim(); applyFilters(); });
  document.getElementById('mobileSearch').addEventListener('input', e => { searchQ = e.target.value.toLowerCase().trim(); applyFilters(); });
  document.getElementById('mobileSearchInline').addEventListener('input', e => renderSearchResults(e.target.value.toLowerCase().trim()));
}

function initSettings() {
  appSettings = {
    stopOnInactivity: true,
    inactivityLimitMin: 50,
    defaultSource: 0,
    uiTheme: 'default',
    openLastChannelOnStart: true,
    compactCards: false,
    ...appSettings
  };
  curSrc = Number(appSettings.defaultSource || 0);
  const activityEvents = ['mousemove','mousedown','keydown','touchstart','scroll'];
  activityEvents.forEach(evt => window.addEventListener(evt, resetInactivityTimer, { passive: true }));
  applyActiveThemeReward();
}

function getSourcesForChannel(ch = currentCh) {
  return ch?.catalog === 'iptv-org' ? IPTV_ORG_SOURCES : STREAMLIVETV_SOURCES;
}

function normalizeSourceIndex(ch = currentCh) {
  const list = getSourcesForChannel(ch);
  if (!list.length) return 0;
  if (curSrc >= list.length) curSrc = 0;
  return curSrc;
}

function saveSettings() {
  localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(appSettings));
  resetInactivityTimer();
}

function applyActiveThemeReward() {
  const rewardThemeOn = hasActiveEffect('uniqueTheme');
  const selectedTheme = UI_THEMES[appSettings.uiTheme] ? appSettings.uiTheme : 'default';
  const theme = rewardThemeOn ? { ...UI_THEMES[selectedTheme], accent: '#8a5cff' } : UI_THEMES[selectedTheme];
  document.documentElement.style.setProperty('--accent', theme.accent);
  document.documentElement.style.setProperty('--bg', theme.bg);
  document.documentElement.style.setProperty('--bg2', theme.bg2);
  document.documentElement.style.setProperty('--bg3', theme.bg3);
  document.documentElement.style.setProperty('--bg4', theme.bg4);
  document.documentElement.style.setProperty('--border', theme.border);
}

function resetInactivityTimer() {
  if (!appSettings.stopOnInactivity || curView !== 'player') return;
  if (frameStoppedByInactivity) return;
  if (inactivityTimer) clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(stopPlaybackForInactivity, Number(appSettings.inactivityLimitMin || 50) * 60 * 1000);
}

function stopPlaybackForInactivity() {
  if (curView !== 'player') return;
  const frame = document.getElementById('embedFrame');
  const videoEl = document.getElementById('iptvVideo');
  if (frame) {
    frame.dataset.savedSrc = frame.src;
    frame.src = 'about:blank';
  }
  if (videoEl) {
    videoEl.dataset.savedSrc = videoEl.currentSrc || currentCh?.streamUrl || '';
    if (activeVideoJsPlayer) activeVideoJsPlayer.pause();
    else videoEl.pause();
  }
  frameStoppedByInactivity = true;
  document.getElementById('inactiveOverlay').style.display = 'flex';
  showToast('Плеер остановлен после длительной неактивности.');
}

function resumePlaybackAfterIdle() {
  const frame = document.getElementById('embedFrame');
  if (frame) frame.src = frame.dataset.savedSrc || (currentCh ? getSourcesForChannel(currentCh)[normalizeSourceIndex(currentCh)].url(currentCh.id) : 'about:blank');
  const videoEl = document.getElementById('iptvVideo');
  if (videoEl) {
    const restoreUrl = videoEl.dataset.savedSrc || currentCh?.streamUrl;
    if (restoreUrl) {
      videoEl.src = restoreUrl;
      if (activeVideoJsPlayer) activeVideoJsPlayer.src({ src: restoreUrl, type: 'application/x-mpegURL' });
      videoEl.play().catch(()=>{});
    }
  }
  frameStoppedByInactivity = false;
  document.getElementById('inactiveOverlay').style.display = 'none';
  resetInactivityTimer();
}

function setupResponsive() {
  const mobile = isMobile();
  document.getElementById('btnGrid').style.display   = mobile ? 'none' : 'flex';
  document.getElementById('btnPlayer').style.display = mobile ? 'none' : 'flex';
  document.getElementById('btnBurger').style.display = mobile ? 'flex' : 'none';
  document.getElementById('btnSettings').style.display = 'flex';
}

async function loadAllChannels() {
  try {
    const [streamInit, iptvInit] = await Promise.all([
      fetch(API_URL, { method:'GET', headers:{'Accept':'application/json'} }).then(r => r.json()),
      loadIptvOrgChannels()
    ]);
    processChannels(extractList(streamInit));
    processIptvOrgChannels(iptvInit);
    const tp = streamInit.pagination?.total_pages || 1;
    const pages = Array.from({length: tp - 1}, (_, i) => i + 2);
    for (let i = 0; i < pages.length; i += 3) {
      await Promise.all(pages.slice(i, i + 3).map(p => fetch(`${API_URL}?page=${p}&limit=50`).then(r => r.json()).then(j => processChannels(extractList(j))).catch(()=>{})));
      await new Promise(r => setTimeout(r, 200));
    }
    handleRouteByPath();
  } catch(e) {
    if (allCh.length === 0) showError('Не удалось загрузить каналы: ' + e.message);
  }
}

async function loadIptvOrgChannels() {
  const [channels, streams] = await Promise.all([
    fetch(IPTV_ORG_CHANNELS_URL).then(r => r.json()),
    fetch(IPTV_ORG_STREAMS_URL).then(r => r.json())
  ]);
  return { channels, streams };
}

function extractList(json) {
  if (Array.isArray(json)) return json;
  for (const k of ['data','channels','items','results','list','streams']) if (Array.isArray(json[k])) return json[k];
  return [];
}

function processChannels(list) {
  const fresh = list.filter(ch => {
      const u = String(ch.owner?.username || ch.owner || '').toLowerCase();
      return ALLOWED.some(a => u.includes(a));
    })
    .filter(ch => (!seenIds.has(ch.id) && seenIds.add(ch.id)))
    .map(ch => ({
      id: ch.id,
      name: (ch.title || ch.name || '').trim() || 'Без названия',
      thumb: ch.thumbnail_url || ch.logo || '',
      type: ch.channel_type || ch.type || 'tv',
      live: !!(ch.is_live || ch.live),
      owner: (typeof ch.owner === 'object' ? ch.owner?.username : ch.owner) || '',
      catalog: 'streamlivetv'
    }));
  if (!fresh.length) return;
  allCh.push(...fresh);
  if (!currentCh) currentCh = allCh[0];
  applyFilters();
}

function processIptvOrgChannels(payload) {
  const channels = Array.isArray(payload?.channels) ? payload.channels : [];
  const streams = Array.isArray(payload?.streams) ? payload.streams : [];
  if (!channels.length || !streams.length) return;
  const IPTV_MAX_CHANNELS = 900;
  const streamByChannel = new Map();
  streams.forEach((s) => {
    if (!s.channel || !s.url) return;
    if (!streamByChannel.has(s.channel)) streamByChannel.set(s.channel, s.url);
  });
  const fresh = channels
    .filter((ch) => streamByChannel.has(ch.id))
    .slice(0, IPTV_MAX_CHANNELS)
    .filter((ch) => {
      const id = `iptv-org:${ch.id}`;
      if (seenIds.has(id)) return false;
      seenIds.add(id);
      return true;
    })
    .map((ch) => ({
      id: `iptv-org:${ch.id}`,
      streamUrl: streamByChannel.get(ch.id),
      name: (ch.name || '').trim() || 'Без названия',
      thumb: ch.logo || '',
      type: ch.is_nsfw ? 'tv' : ((ch.categories || []).includes('radio') ? 'radio' : 'tv'),
      live: true,
      owner: 'iptv-org',
      catalog: 'iptv-org'
    }));
  if (!fresh.length) return;
  allCh.push(...fresh);
  if (!currentCh) currentCh = allCh[0];
  applyFilters();
}

function applyFilters() {
  view = allCh.filter(ch => (typeF === 'all' || ch.type === typeF) && (!searchQ || ch.name.toLowerCase().includes(searchQ)));
  document.getElementById('sbCount').textContent = view.length;
  renderSidebarList();
  if (curView === 'grid') renderGrid();
}

function setType(btn, t) {
  typeF = t;
  document.querySelectorAll('.pill').forEach(b => b.classList.toggle('on', (b.getAttribute('onclick') || '').includes(`'${t}'`)));
  applyFilters();
}

function renderSidebarList() {
  ['sidebarList','drawerList'].forEach(listId => {
    const el = document.getElementById(listId); if (!el) return; el.innerHTML = '';
    view.forEach(ch => {
      const d = document.createElement('div');
      d.className = 'ch-item' + (currentCh?.id === ch.id ? ' on' : '');
      d.dataset.id = ch.id;
      d.innerHTML = `<div class="ch-logo">${ch.thumb ? `<img src="${esc(ch.thumb)}" onerror="this.style.display='none'">` : esc(ch.name.slice(0,4))}</div>
        <div class="ch-info"><div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-meta">${ch.type==='radio'?'📻':'📺'} · ${esc(ch.owner)} ${subscriptions.has(ch.id)?'<span class="rec-chip">SUB</span>':''}</div></div>
        <div class="${ch.live?'live-pip':'off-pip'}"></div>`;
      d.onclick = () => { play(ch, 'sidebar'); isMobile() ? (closeDrawer(), mobileTab('player')) : switchView('player'); };
      el.appendChild(d);
    });
  });
}

function renderGrid() {
  const c = document.getElementById('content'); if (curView !== 'grid') return;
  c.innerHTML = '';
  const w = document.createElement('div'); w.className = `grid-wrap${appSettings.compactCards ? ' compact-grid' : ''}`;
  if (!allCh.length) { w.innerHTML = '<div class="state-screen"><div class="loader"></div><span>Загрузка каналов...</span></div>'; c.appendChild(w); return; }
  if (!view.length) { w.innerHTML = '<div class="state-screen"><span>Ничего не найдено</span></div>'; c.appendChild(w); return; }

  const recommended = getRecommended(view, currentCh?.id, 12);
  const live = view.filter(ch => ch.live);
  const subs = view.filter(ch => subscriptions.has(ch.id));
  const tv = view.filter(ch => !ch.live && ch.type === 'tv');
  const radio = view.filter(ch => !ch.live && ch.type === 'radio');

  [['✨ Умная лента', recommended], ['🔔 Подписки', subs], ['🔴 В эфире', live], ['📺 Телеканалы', tv], ['📻 Радиостанции', radio]]
    .filter(([,items]) => items.length)
    .forEach(([label,items]) => {
      const lbl = document.createElement('div'); lbl.className='sec-lbl'; lbl.textContent=label; w.appendChild(lbl);
      const g = document.createElement('div'); g.className='ch-grid'; items.forEach(ch => g.appendChild(makeCard(ch))); w.appendChild(g);
    });
  c.appendChild(w);
}

function makeCard(ch) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<div class="card-thumb">${ch.thumb ? `<img src="${esc(ch.thumb)}" onerror="this.remove()">` : `<div class="card-fb">${esc(ch.name.slice(0,7))}</div>`}
      <div class="play-ov"><div class="play-ic"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
      <div class="badge ${ch.live?'':'off'}">${ch.live?'LIVE':'OFF'}</div>${ch.type==='radio'?'<div class="rbadge">RADIO</div>':''}
      <button class="sub-btn small ${subscriptions.has(ch.id)?'on':''}" data-sub-id="${ch.id}">${subscriptions.has(ch.id)?'Подписан':'Подписаться'}</button>
    </div>
    <div class="card-body"><div class="card-name">${esc(ch.name)}</div><div class="card-sub">${esc(ch.owner)}</div></div>`;
  card.setAttribute('data-url', channelPath(ch));
  card.onclick = (e) => { if (e.target.closest('.sub-btn')) return; play(ch, 'card'); isMobile()?mobileTab('player'):switchView('player'); };
  card.querySelector('.sub-btn').onclick = (e) => { e.stopPropagation(); toggleSubscription(ch.id); };
  return card;
}

function play(ch, source='unknown') {
  currentCh = ch;
  trackInterest(ch, source);
  updateSeoForChannel(ch);
  document.querySelectorAll('.ch-item').forEach(el => el.classList.toggle('on', String(el.dataset.id) === String(ch.id)));
  if (curView === 'player') renderPlayer(ch);
}

function renderPlayer(ch) {
  const c = document.getElementById('content');
  const channelSources = getSourcesForChannel(ch);
  normalizeSourceIndex(ch);
  const srcMeta = channelSources[curSrc];
  iptvMirrorTry = 0;
  const playbackMarkup = ch.catalog === 'iptv-org'
    ? (srcMeta.mode === 'iframePool'
      ? `<iframe id="iptvMirrorFrame" src="about:blank" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>`
      : `<video id="iptvVideo" class="video-js vjs-default-skin" controls playsinline preload="auto"></video>`)
    : `<iframe id="embedFrame" src="${esc(srcMeta.url(ch.id))}" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>`;

function switchSrc(idx) {
  curSrc = idx;
  if (currentCh) renderPlayer(currentCh);
  document.querySelectorAll('.src-btn').forEach((b,i)=>b.classList.toggle('on', i===idx));
}

function destroyIptvPlayers() {
  if (activeVideoJsPlayer) {
    activeVideoJsPlayer.dispose();
    activeVideoJsPlayer = null;
  }
}

function mountIptvPlayer(ch, srcMeta) {
  destroyIptvPlayers();
  if (ch.catalog !== 'iptv-org' || !ch.streamUrl) return;
  if (srcMeta.mode === 'iframePool') {
    mountIptvMirror(ch, srcMeta);
    return;
  }
  const videoEl = document.getElementById('iptvVideo');
  if (!videoEl) return;
  if (window.videojs) {
    activeVideoJsPlayer = window.videojs(videoEl, { autoplay: true, controls: true, fluid: true });
    activeVideoJsPlayer.src({ src: ch.streamUrl, type: 'application/x-mpegURL' });
    activeVideoJsPlayer.on('error', () => autoSwitchIptvSource());
    activeVideoJsPlayer.play().catch(()=>{});
  } else {
    videoEl.src = ch.streamUrl;
    videoEl.addEventListener('error', autoSwitchIptvSource, { once: true });
    videoEl.play().catch(()=>{});
  }
}

function mountIptvMirror(ch, srcMeta) {
  const frame = document.getElementById('iptvMirrorFrame');
  if (!frame) return;
  const mirrors = Array.isArray(srcMeta.urls) ? srcMeta.urls : [];
  if (!mirrors.length) return;
  const mountMirrorAt = (idx) => {
    iptvMirrorTry = idx % mirrors.length;
    const base = String(mirrors[iptvMirrorTry] || '').replace(/\/+$/, '');
    const stream = encodeURIComponent(ch.streamUrl);
    frame.src = `${base}/?src=${stream}`;
    frame.onerror = () => {
      const next = iptvMirrorTry + 1;
      if (next < mirrors.length) {
        showToast(`Mirror недоступен, пробую узел ${next + 1}/${mirrors.length}.`);
        mountMirrorAt(next);
      } else {
        autoSwitchIptvSource();
      }
    };
  };
  mountMirrorAt(iptvMirrorTry);
}

function autoSwitchIptvSource() {
  if (iptvAutoSwitchLock || !currentCh || currentCh.catalog !== 'iptv-org') return;
  const list = getSourcesForChannel(currentCh);
  if (list.length < 2) return;
  iptvAutoSwitchLock = true;
  const next = (curSrc + 1) % list.length;
  showToast('Поток недоступен. Переключаю на резервный источник.');
  switchSrc(next);
  setTimeout(() => { iptvAutoSwitchLock = false; }, 800);
}

function renderRelated(current) {
  const el = document.getElementById('relGrid'); if (!el) return;
  getRecommended(view.filter(c => c.id !== current.id), current.id, 12).forEach(ch => el.appendChild(makeCard(ch)));
}

function getRecommended(pool, excludeId, limit=10) {
  return [...pool]
    .filter(ch => ch.id !== excludeId)
    .map(ch => ({ ch, score: scoreChannel(ch) }))
    .sort((a,b) => (b.score - a.score) || String(a.ch.id).localeCompare(String(b.ch.id)))
    .slice(0, limit)
    .map(x => x.ch);
}

function scoreChannel(ch) {
  const typeScore = Number(interestProfile.types?.[ch.type] || 0);
  const ownerScore = Number(interestProfile.owners?.[ch.owner] || 0);
  const watchScore = Number(interestProfile.watch?.[ch.id] || 0);
  const subBonus = subscriptions.has(ch.id) ? 8 : 0;
  const liveBonus = ch.live ? 1.5 : 0;
  const searchBoost = searchQ && ch.name.toLowerCase().includes(searchQ) ? 2 : 0;
  const rewardBoost = rewardBoostUntil > Date.now() && subscriptions.has(ch.id) ? 7 : 0;
  const themedBonus = hasActiveEffect('uniqueTheme') ? 0.8 : 0;
  return typeScore + ownerScore + watchScore + subBonus + liveBonus + searchBoost + rewardBoost + themedBonus;
}

function trackInterest(ch, source) {
  interestProfile.types = interestProfile.types || {};
  interestProfile.owners = interestProfile.owners || {};
  interestProfile.watch = interestProfile.watch || {};
  interestProfile.types[ch.type] = (interestProfile.types[ch.type] || 0) + 1;
  interestProfile.owners[ch.owner] = (interestProfile.owners[ch.owner] || 0) + 0.6;
  interestProfile.watch[ch.id] = (interestProfile.watch[ch.id] || 0) + 1;
  localStorage.setItem(STORAGE_KEYS.profile, JSON.stringify(interestProfile));
}

function toggleSubscription(id) {
  const wasSub = subscriptions.has(id);
  wasSub ? subscriptions.delete(id) : subscriptions.add(id);
  localStorage.setItem(STORAGE_KEYS.subs, JSON.stringify([...subscriptions]));
  applyFilters();
  if (currentCh && String(currentCh.id) === String(id) && curView === 'player') renderPlayer(currentCh);
  const ch = allCh.find(x => String(x.id)===String(id));
  if (ch) showToast(wasSub ? `Вы отписались от «${ch.name}».` : `Подписка оформлена: «${ch.name}».`);
}

function getBaseUrl() { return `${window.location.protocol}//${window.location.host}`; }
function channelPath(ch) {
  const slug = slugify(ch.name);
  const params = new URLSearchParams({ source: ch.catalog || 'streamlivetv', channel: slug, cid: String(ch.id) });
  return `${getAppUrl()}?${params.toString()}`;
}
function slugify(text) {
  const map = { 'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'c','ч':'ch','ш':'sh','щ':'sch','ы':'y','э':'e','ю':'yu','я':'ya','ь':'','ъ':'' };
  return text.toLowerCase().split('').map(ch => map[ch] ?? ch).join('').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,80);
}
function deSlugify(slug) {
  return String(slug || '')
    .split('-')
    .filter(Boolean)
    .map(part => part.charAt(0).toUpperCase() + part.slice(1))
    .join(' ') || 'Канал';
}

function handleRouteByPath() {
  const { channel: slug, source, cid } = getRouteRequest();
  if ((!slug && !cid) || !allCh.length) return;
  const byId = cid ? allCh.find(ch => String(ch.id) === String(cid) && (!source || ch.catalog === source)) : null;
  const normalizedSlug = String(slug || '').toLowerCase();
  const bySlug = !byId && normalizedSlug
    ? allCh.find(ch => slugify(ch.name).toLowerCase() === normalizedSlug && (!source || ch.catalog === source))
    : null;
  const found = byId || bySlug;
  if (found) {
    play(found, 'route');
    if (appSettings.openLastChannelOnStart !== false) switchView('player');
  }
}

function getRouteRequest() {
  const params = new URLSearchParams(window.location.search);
  let channel = params.get('channel');
  let source = params.get('source');
  let cid = params.get('cid');
  if (!channel) {
    const legacy = window.location.pathname.match(new RegExp(`${LEGACY_APP_PATH.replace(/\//g, '\\/')}([^/]+)`, 'i'));
    if (legacy?.[1]) {
      channel = legacy[1];
      source = 'streamlivetv';
      const newUrl = `${getAppUrl()}?source=${encodeURIComponent(source)}&channel=${encodeURIComponent(channel)}`;
      history.replaceState({}, '', newUrl);
    }
  }
  return { channel, source, cid };
}

function updateSeoForChannel(ch) {
  const url = channelPath(ch);
  const target = `${getBaseUrl()}${url}`;
  if (window.location.href !== target) history.replaceState({channelId: ch.id}, '', url);
  document.title = `${ch.name} — смотреть прямой эфир | StreamLiveTV`;
  setMeta('description', `Смотрите ${ch.name} онлайн в прямом эфире. Живой канал ${ch.type==='radio'?'радио':'ТВ'}, подборки и рекомендации StreamLiveTV.`);
  document.getElementById('canonicalLink')?.setAttribute('href', target);
  document.getElementById('ogTitle')?.setAttribute('content', document.title);
  document.getElementById('ogDescription')?.setAttribute('content', `Прямой эфир: ${ch.name}. Подпишитесь и получайте live-уведомления.`);
  document.getElementById('ogUrl')?.setAttribute('content', target);
  document.getElementById('twitterTitle')?.setAttribute('content', document.title);
  document.getElementById('twitterDescription')?.setAttribute('content', `Смотрите ${ch.name} онлайн на StreamLiveTV.`);
  updateStructuredData(ch);
}

function setMeta(name, content) {
  let el = document.querySelector(`meta[name="${name}"]`);
  if (!el) { el = document.createElement('meta'); el.setAttribute('name', name); document.head.appendChild(el); }
  el.setAttribute('content', content);
}

function updateStructuredData(ch) {
  const el = document.getElementById('seoStructuredData'); if (!el) return;
  el.textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@type': 'BroadcastService',
    name: ch.name,
    description: `Прямой эфир канала ${ch.name} в каталоге StreamLiveTV.`,
    url: `${getBaseUrl()}${channelPath(ch)}`,
    inLanguage: 'ru',
    potentialAction: { '@type': 'WatchAction', target: `${getBaseUrl()}${channelPath(ch)}` },
    broadcastDisplayName: ch.name,
    areaServed: 'RU',
    hasBroadcastChannel: {
      '@type': 'BroadcastChannel',
      name: ch.name,
      genre: ch.type === 'radio' ? 'Radio' : 'TV',
      isLiveBroadcast: !!ch.live
    },
    publisher: { '@type': 'Organization', name: 'NonStopStream', url: `${getBaseUrl()}${getAppUrl()}` }
  });
}

function maybeRequestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') setTimeout(() => Notification.requestPermission().catch(()=>{}), 2500);
}

function startNotificationPolling() {
  setInterval(checkLiveNotifications, hasActiveEffect('proAlerts') ? 20000 : 45000);
  setTimeout(checkLiveNotifications, 8000);
}

async function checkLiveNotifications() {
  if (!subscriptions.size) return;
  try {
    const r = await fetch(`${API_URL}?page=1&limit=80`); const json = await r.json();
    const list = extractList(json).map(ch => ({ id: ch.id, live: !!(ch.is_live || ch.live), name: ch.title || ch.name || 'Канал' }));
    list.forEach(ch => {
      const prev = !!liveSnapshot[ch.id];
      liveSnapshot[ch.id] = ch.live;
      if (!prev && ch.live && subscriptions.has(ch.id)) {
        const text = `${ch.name} вышел в live`; showToast(text, true);
        if ('Notification' in window && Notification.permission === 'granted') new Notification('StreamLiveTV', { body: text });
      }
    });
    localStorage.setItem(STORAGE_KEYS.notifications, JSON.stringify(liveSnapshot));
  } catch(_) {}
}

function showToast(text, sticky=false) {
  const w = document.getElementById('toastWrap'); if (!w) return;
  const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `<b>StreamLiveTV</b><div>${esc(text)}</div>`;
  w.appendChild(t);
  setTimeout(() => t.remove(), sticky ? 7000 : 3000);
}

function switchView(v) {
  curView = v;
  document.getElementById('btnGrid')?.classList.toggle('on', v==='grid');
  document.getElementById('btnPlayer')?.classList.toggle('on', v==='player');
  document.getElementById('btnSettings')?.classList.toggle('on', v==='settings');

  if (v !== 'player') destroyIptvPlayers();

function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); document.body.style.overflow=''; }

function initStarsLoop() {
  pruneRewardEffects();
  renderRewardsCatalog();
  updateStarsHud();
  document.getElementById('starsRewardsBtn')?.addEventListener('click', () => openBearOverlay(true));
  document.getElementById('claimStarsBtn')?.addEventListener('click', claimStarsByTap);
  document.getElementById('closeBearBtn')?.addEventListener('click', closeBearOverlay);
  setInterval(updateStarsHud, 1000);
  setInterval(() => {
    if (Date.now() >= Number(starsState.nextClaimAt || 0)) openBearOverlay(false);
  }, 15000);
}

function openBearOverlay(forceOpen) {
  if (!forceOpen && Date.now() < Number(starsState.nextClaimAt || 0)) return;
  const overlay = document.getElementById('bearOverlay');
  if (overlay) overlay.style.display = 'flex';
}

function closeBearOverlay() {
  const overlay = document.getElementById('bearOverlay');
  if (overlay) overlay.style.display = 'none';
}

function claimStarsByTap() {
  const now = Date.now();
  if (now < Number(starsState.nextClaimAt || 0)) {
    showToast('Пока рано. Следующий Stars-тап будет доступен по таймеру.');
    closeBearOverlay();
    return;
  }
  const gain = hasActiveEffect('doubleClaim') ? 20 : 10;
  starsState.stars = Number(starsState.stars || 0) + gain;
  starsState.nextClaimAt = now + (30 * 60 * 1000);
  localStorage.setItem(STORAGE_KEYS.stars, JSON.stringify(starsState));
  showToast(`Отлично! +${gain} Stars за тап 🧸⭐`);
  updateStarsHud();
  renderRewardsCatalog();
  closeBearOverlay();
}

function renderRewardsCatalog() {
  const wrap = document.getElementById('rewardsList');
  if (!wrap) return;
  wrap.innerHTML = `<b>Варианты обмена Stars:</b>` + REWARD_CATALOG.map(reward => {
    const canBuy = Number(starsState.stars || 0) >= reward.cost;
    return `<div class="reward-row"><span>• ${reward.cost} ⭐ — ${esc(reward.title)}</span><button data-reward="${reward.id}" title="${canBuy ? 'Обменять сейчас' : 'Не хватает Stars'}">${canBuy ? 'Обменять' : 'Не хватает'}</button></div>`;
  }).join('');
  wrap.querySelectorAll('button[data-reward]').forEach(btn => {
    btn.onclick = () => redeemReward(btn.dataset.reward);
  });
}

function redeemReward(rewardId) {
  const reward = REWARD_CATALOG.find(r => r.id === rewardId);
  if (!reward) return;
  if (Number(starsState.stars || 0) < reward.cost) return showToast('Недостаточно Stars для обмена.');
  starsState.stars -= reward.cost;
  const payload = reward.apply();
  if (payload.boostSubscriptions) {
    rewardBoostUntil = Date.now() + reward.durationMs;
    localStorage.setItem(STORAGE_KEYS.rewardBoostUntil, String(rewardBoostUntil));
  }
  if (payload.uniqueTheme) rewardEffects.uniqueThemeUntil = Date.now() + reward.durationMs;
  if (payload.proAlerts) rewardEffects.proAlertsUntil = Date.now() + reward.durationMs;
  if (payload.doubleClaim) rewardEffects.doubleClaimUntil = Date.now() + reward.durationMs;
  if (payload.raffleTickets) rewardEffects.raffleTickets = Number(rewardEffects.raffleTickets || 0) + payload.raffleTickets;
  if (payload.unlockTheme) {
    rewardEffects.unlockedThemes = Array.isArray(rewardEffects.unlockedThemes) ? rewardEffects.unlockedThemes : [];
    if (!rewardEffects.unlockedThemes.includes(payload.unlockTheme)) rewardEffects.unlockedThemes.push(payload.unlockTheme);
    appSettings.uiTheme = payload.unlockTheme;
    saveSettings();
  }
  if (payload.addStars) starsState.stars += payload.addStars;
  localStorage.setItem(STORAGE_KEYS.rewardEffects, JSON.stringify(rewardEffects));
  localStorage.setItem(STORAGE_KEYS.stars, JSON.stringify(starsState));
  applyActiveThemeReward();
  showToast(`Награда активирована: ${reward.title}.`);
  renderRewardsCatalog();
  updateStarsHud();
}

function hasActiveEffect(effectKey) {
  const until = Number(rewardEffects?.[`${effectKey}Until`] || 0);
  return until > Date.now();
}

function pruneRewardEffects() {
  if (!Array.isArray(rewardEffects.unlockedThemes)) rewardEffects.unlockedThemes = [];
  ['uniqueThemeUntil','proAlertsUntil','doubleClaimUntil'].forEach(k => {
    if (Number(rewardEffects[k] || 0) < Date.now()) delete rewardEffects[k];
  });
  localStorage.setItem(STORAGE_KEYS.rewardEffects, JSON.stringify(rewardEffects));
  applyActiveThemeReward();
}

function updateStarsHud() {
  const starsEl = document.getElementById('starsCount');
  const metaEl = document.getElementById('starsMeta');
  if (!starsEl || !metaEl) return;
  const next = Number(starsState.nextClaimAt || 0);
  const left = Math.max(0, next - Date.now());
  const min = String(Math.floor(left / 60000)).padStart(2, '0');
  const sec = String(Math.floor((left % 60000) / 1000)).padStart(2, '0');
  starsEl.textContent = `⭐ ${Number(starsState.stars || 0)} Stars`;
  const tickets = Number(rewardEffects.raffleTickets || 0);
  const extra = tickets ? ` · 🎟️ ${tickets}` : '';
  metaEl.textContent = (left ? `До награды: ${min}:${sec}` : 'Доступно! Мишка ждёт тап 👆') + extra;
}

function showLoading() { document.getElementById('content').innerHTML = '<div class="state-screen"><div class="loader"></div><span>Загрузка каналов...</span></div>'; }
function showError(msg) { document.getElementById('content').innerHTML = `<div class="state-screen"><div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 24px;max-width:420px;text-align:center"><div style="font-size:15px;font-weight:700;margin-bottom:8px">Ошибка загрузки</div><div style="font-size:13px;color:var(--text2);line-height:1.6">${esc(msg)}</div></div></div>`; }
function showNoCh() { document.getElementById('content').innerHTML = '<div class="no-ch"><div class="no-ch-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg></div><h3>Выберите канал</h3><p>Нажмите на канал в сетке или списке</p></div>'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
