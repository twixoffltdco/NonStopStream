<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Mini-Apps — by Twixoff</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0c10; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }
        .app-container { display: flex; width: 100%; height: 100%; }
        .iframe-wrapper { flex: 1; position: relative; background: #000; height: 100%; }
        .iframe-wrapper iframe { width: 100%; height: 100%; border: none; background: #fff; }
        .sidebar { width: 280px; background: rgba(18, 22, 28, 0.98); backdrop-filter: blur(10px); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; z-index: 20; transition: transform 0.3s; color: #eef2ff; overflow-y: auto; }
        .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, #c084fc, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .update-status { font-size: 0.7rem; padding: 8px 16px; margin: 8px 16px; border-radius: 20px; text-align: center; background: rgba(59,130,246,0.2); }
        .refresh-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 16px; margin: 12px 16px; border-radius: 40px; cursor: pointer; }
        .service-list { display: flex; flex-direction: column; gap: 6px; padding: 8px 12px; flex: 1; }
        .service-btn { background: rgba(255,255,255,0.05); border: none; border-radius: 16px; padding: 12px 16px; text-align: left; font-size: 0.9rem; font-weight: 500; color: #e2e8f0; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .service-btn.active { background: linear-gradient(95deg, #3b82f6, #8b5cf6); color: white; }
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(12,15,20,0.96); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 8px 8px 20px; z-index: 30; justify-content: space-around; overflow-x: auto; }
        .mobile-nav-item { flex: 0 0 auto; min-width: 65px; display: flex; flex-direction: column; align-items: center; background: transparent; border: none; padding: 8px 4px; border-radius: 24px; color: #94a3b8; font-size: 0.65rem; gap: 4px; cursor: pointer; }
        .mobile-nav-item.active { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .fullscreen-banner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0c10; z-index: 1000; display: flex; align-items: center; justify-content: center; overflow-y: auto; }
        .banner-content { background: linear-gradient(135deg, #1a1e2c, #0f1219); border-radius: 48px; max-width: 95%; width: 1300px; max-height: 90vh; overflow-y: auto; padding: 32px 28px; border: 1px solid rgba(255,255,255,0.1); }
        .banner-content h1 { font-size: 2rem; background: linear-gradient(135deg, #c084fc, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; margin-bottom: 8px; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin: 24px 0; max-height: 65vh; overflow-y: auto; padding: 8px; }
        .preview-card { background: rgba(30,32,44,0.95); border-radius: 20px; overflow: hidden; cursor: pointer; transition: all 0.3s; border: 2px solid rgba(255,255,255,0.1); }
        .preview-card:hover { transform: translateY(-6px); border-color: #3b82f6; box-shadow: 0 10px 30px rgba(59,130,246,0.4); }
        .preview-screenshot { width: 100%; height: 200px; background: #1e1f2c; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .preview-screenshot img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
        .preview-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); color: white; flex-direction: column; gap: 12px; z-index: 2; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .preview-info { padding: 14px; background: rgba(0,0,0,0.6); text-align: center; }
        .preview-name { font-weight: 700; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .close-banner { background: linear-gradient(95deg, #3b82f6, #8b5cf6); border: none; color: white; font-weight: bold; padding: 14px; border-radius: 40px; width: 100%; font-size: 1rem; cursor: pointer; margin-top: 16px; }
        .menu-toggle { display: none; position: fixed; top: 16px; left: 16px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border: none; color: white; font-size: 26px; width: 48px; height: 48px; border-radius: 30px; z-index: 45; cursor: pointer; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 35; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; transform: translateX(-100%); z-index: 40; }
            .sidebar.open { transform: translateX(0); }
            .mobile-nav { display: flex; }
            .iframe-wrapper { margin-bottom: 70px; height: calc(100% - 70px); }
            .overlay.active { display: block; }
            .menu-toggle { display: flex; }
            .preview-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📱 Mini-Apps By Twixoff</h2>
            <p>Автообновление из GitHub</p>
        </div>
        <div class="update-status" id="updateStatus">📡 Загрузка...</div>
        <button class="refresh-btn" id="refreshBtn">🔄 Обновить</button>
        <div class="service-list" id="serviceList"></div>
    </div>
    <div class="overlay" id="overlay"></div>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="iframe-wrapper">
        <iframe id="mainFrame" src="about:blank"></iframe>
    </div>
    <div class="mobile-nav" id="mobileNav"></div>
</div>

<div class="fullscreen-banner" id="banner">
    <div class="banner-content">
        <h1>📸 Twixoff MINI-APPS</h1>
        <p style="text-align:center; opacity:0.7;">Скриншоты создаются автоматически — нажми на любое приложение</p>
        <div class="preview-grid" id="previewGrid"></div>
        <button class="close-banner" id="closeBanner">🚀 Начать</button>
    </div>
</div>

<script>
    const GITHUB_USER = "OinkTechLtd";
    const GITHUB_REPO = "Mini-Apps";
    const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;
    const RAW_URL = `https://htmlpreview.github.io/?https://github.com/${GITHUB_USER}/${GITHUB_REPO}/blob/main/`;
    
    let apps = [];
    let activeId = null;
    let screenshotCache = {};
    
    const mainFrame = document.getElementById('mainFrame');
    const serviceListDiv = document.getElementById('serviceList');
    const mobileNavDiv = document.getElementById('mobileNav');
    const bannerDiv = document.getElementById('banner');
    const previewGrid = document.getElementById('previewGrid');
    const closeBannerBtn = document.getElementById('closeBanner');
    const refreshBtn = document.getElementById('refreshBtn');
    const updateStatus = document.getElementById('updateStatus');
    const menuToggle = document.getElementById('menuToggle');
    const overlay = document.getElementById('overlay');
    const sidebar = document.getElementById('sidebar');
    
    // Загрузка списка приложений
    async function loadAppsList() {
        try {
            updateStatus.innerHTML = '📡 Загрузка...';
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error(`GitHub API: ${response.status}`);
            const files = await response.json();
            const htmlFiles = files.filter(f => f.name.endsWith('.html') && !f.name.includes('README'));
            
            const newApps = htmlFiles.map(file => {
                let name = file.name.replace('.html', '').replace(/[-_]/g, ' ');
                name = name.replace(/\b\w/g, l => l.toUpperCase());
                let icon = '📱';
                const lower = name.toLowerCase();
                if (lower.includes('кино') || lower.includes('player')) icon = '🎬';
                else if (lower.includes('погод')) icon = '⛅';
                else if (lower.includes('search')) icon = '🔍';
                else if (lower.includes('video')) icon = '🎥';
                else if (lower.includes('coder')) icon = '💻';
                return { id: file.name.replace('.html', ''), name, url: RAW_URL + file.name, icon, filename: file.name };
            });
            apps = newApps;
            localStorage.setItem('apps_cache', JSON.stringify(apps));
            updateStatus.innerHTML = `✅ ${apps.length} приложений`;
            return true;
        } catch(e) {
            const cached = localStorage.getItem('apps_cache');
            if (cached) { apps = JSON.parse(cached); updateStatus.innerHTML = `📦 Кэш (${apps.length})`; return true; }
            updateStatus.innerHTML = '❌ Ошибка';
            return false;
        }
    }
    
    // Создание скриншота через загрузку HTML
    async function createScreenshot(url) {
        return new Promise(async (resolve) => {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Не удалось загрузить');
                const html = await response.text();
                
                const iframe = document.createElement('iframe');
                iframe.style.position = 'fixed';
                iframe.style.top = '-10000px';
                iframe.style.left = '-10000px';
                iframe.style.width = '1280px';
                iframe.style.height = '800px';
                iframe.style.visibility = 'hidden';
                document.body.appendChild(iframe);
                
                let resolved = false;
                const timeout = setTimeout(() => {
                    if (!resolved) { resolved = true; document.body.removeChild(iframe); resolve(null); }
                }, 10000);
                
                iframe.onload = () => {
                    setTimeout(() => {
                        if (resolved) return;
                        try {
                            const doc = iframe.contentDocument || iframe.contentWindow.document;
                            if (doc && doc.body) {
                                html2canvas(doc.body, { scale: 0.5, backgroundColor: '#ffffff', logging: false }).then(canvas => {
                                    if (!resolved) {
                                        resolved = true;
                                        clearTimeout(timeout);
                                        document.body.removeChild(iframe);
                                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                                    }
                                }).catch(() => { if (!resolved) { resolved = true; clearTimeout(timeout); document.body.removeChild(iframe); resolve(null); } });
                            } else { if (!resolved) { resolved = true; clearTimeout(timeout); document.body.removeChild(iframe); resolve(null); } }
                        } catch(e) { if (!resolved) { resolved = true; clearTimeout(timeout); document.body.removeChild(iframe); resolve(null); } }
                    }, 2000);
                };
                iframe.srcdoc = html;
            } catch(e) { resolve(null); }
        });
    }
    
    // Отображение скриншотов
    async function renderScreenshots() {
        if (!apps.length) { previewGrid.innerHTML = '<div style="text-align:center; padding:40px;">📭 Нет приложений</div>'; return; }
        previewGrid.innerHTML = '';
        
        for (const app of apps) {
            const card = document.createElement('div');
            card.className = 'preview-card';
            card.innerHTML = `
                <div class="preview-screenshot"><div class="preview-loading"><div class="spinner"></div><div>Скриншот...</div><div style="font-size:0.7rem;">${app.name}</div></div><img style="display:none;"></div>
                <div class="preview-info"><div class="preview-name"><span>${app.icon}</span><span>${app.name}</span></div></div>
            `;
            card.addEventListener('click', () => { closeBanner(); loadApp(app.id); });
            previewGrid.appendChild(card);
            
            const img = card.querySelector('img');
            const loading = card.querySelector('.preview-loading');
            
            let screenshot = screenshotCache[app.url];
            if (!screenshot) {
                screenshot = await createScreenshot(app.url);
                if (screenshot) screenshotCache[app.url] = screenshot;
            }
            if (screenshot) { img.src = screenshot; img.style.display = 'block'; loading.style.display = 'none'; }
            else { loading.innerHTML = `${app.icon}<br>${app.name}<br><span style="font-size:0.7rem;">Скриншот не создан</span>`; }
        }
    }
    
    function loadApp(id) {
        const app = apps.find(a => a.id === id);
        if (app) { mainFrame.src = app.url; activeId = app.id; updateActiveStyles(); }
    }
    
    function updateActiveStyles() {
        document.querySelectorAll('.service-btn').forEach(btn => { if (btn.dataset.id === activeId) btn.classList.add('active'); else btn.classList.remove('active'); });
        document.querySelectorAll('.mobile-nav-item').forEach(item => { if (item.dataset.id === activeId) item.classList.add('active'); else item.classList.remove('active'); });
    }
    
    function renderSidebar() {
        if (!apps.length) { serviceListDiv.innerHTML = '<div style="text-align:center; padding:20px;">Нет приложений</div>'; return; }
        serviceListDiv.innerHTML = '';
        apps.forEach(app => {
            const btn = document.createElement('button');
            btn.className = 'service-btn';
            btn.dataset.id = app.id;
            btn.innerHTML = `<span>${app.icon}</span><span style="flex:1;">${app.name}</span>`;
            btn.addEventListener('click', () => { loadApp(app.id); if (window.innerWidth <= 768) { sidebar.classList.remove('open'); overlay.classList.remove('active'); } });
            serviceListDiv.appendChild(btn);
        });
    }
    
    function renderMobileNav() {
        if (!apps.length) return;
        mobileNavDiv.innerHTML = '';
        apps.forEach(app => {
            const item = document.createElement('button');
            item.className = 'mobile-nav-item';
            item.dataset.id = app.id;
            item.innerHTML = `<span style="font-size:1.2rem;">${app.icon}</span><span>${app.name.slice(0,6)}</span>`;
            item.addEventListener('click', () => { loadApp(app.id); if (sidebar.classList.contains('open')) { sidebar.classList.remove('open'); overlay.classList.remove('active'); } });
            mobileNavDiv.appendChild(item);
        });
    }
    
    function closeBanner() {
        bannerDiv.style.opacity = '0';
        setTimeout(() => { bannerDiv.style.display = 'none'; }, 300);
        localStorage.setItem('banner_shown', 'true');
        if (apps.length && !activeId) loadApp(apps[0].id);
    }
    
    async function refreshAll() {
        refreshBtn.innerHTML = '🔄 Загрузка...';
        screenshotCache = {};
        await loadAppsList();
        if (apps.length) { renderSidebar(); renderMobileNav(); if (bannerDiv.style.display !== 'none') await renderScreenshots(); if (!activeId) loadApp(apps[0].id); }
        refreshBtn.innerHTML = '🔄 Обновить';
    }
    
    // Автообновление при коммитах
    let lastCommit = null;
    setInterval(async () => {
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/commits?per_page=1`);
            const commits = await res.json();
            if (commits[0] && commits[0].sha !== lastCommit) {
                lastCommit = commits[0].sha;
                await refreshAll();
                updateStatus.innerHTML = '✨ Обновлено!';
                setTimeout(() => { updateStatus.innerHTML = `✅ ${apps.length} приложений`; }, 3000);
            }
        } catch(e) {}
    }, 60000);
    
    async function init() {
        await loadAppsList();
        if (apps.length) {
            renderSidebar(); renderMobileNav();
            if (!localStorage.getItem('banner_shown')) { bannerDiv.style.display = 'flex'; await renderScreenshots(); }
            else { bannerDiv.style.display = 'none'; loadApp(apps[0].id); }
        } else { bannerDiv.style.display = 'flex'; previewGrid.innerHTML = '<div style="text-align:center; padding:40px;">❌ Ошибка загрузки</div>'; }
        
        menuToggle.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
        refreshBtn.addEventListener('click', refreshAll);
        closeBannerBtn.addEventListener('click', closeBanner);
        
        console.log('%c✅ ГОТОВО! СКРИНШОТЫ РАБОТАЮТ!', 'color: #10b981; font-size: 16px; font-weight: bold');
        console.log('%c📸 Приложения: ' + apps.length, 'color: #60a5fa');
        console.log('%c🔄 Автообновление каждую минуту', 'color: #c084fc');
    }
    
    init();
</script>
</body>
</html>
